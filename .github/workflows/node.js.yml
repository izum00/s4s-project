on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches: ["develop"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: true
  #ci-${{ github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/configure-pages@v3

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies and build site
      run: |
        npm i -g pnpm@6
        npm install --save-dev @svgr/webpack@5
        npm install scratch-vm@git+https://huggingface.co/datasets/soiz1/s4s-vm
        pnpm up
        pnpm i --shamefully-hoist --force
        NODE_ENV=production webpack --bail
  deploy:
    environment:
      name: github-pages
      url: 'https://penguinmod.com/project'
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
